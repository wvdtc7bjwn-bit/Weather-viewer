<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050914" />
  <meta name="application-name" content="Weather Viewer" />
  <title>Weather Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQkL1hjeY5nld9wZ9YEzR1pKNRaI7H4=" crossorigin="" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="app-title">
        <span class="app-title-main">Weather Viewer</span>
        <span class="app-title-sub">JMA Data Visualization</span>
      </div>

      <section class="current-panel">
        <div id="mode-label" class="mode-label">雨雲レーダー</div>
        <h1 id="panel-title">最新の雨雲レーダー</h1>
        <p id="panel-time">更新時刻を取得中...</p>
        <div id="primary-card" class="primary-card radar-card">
          <span class="primary-card-label">表示</span>
          <strong id="primary-value">Radar</strong>
        </div>
        <p id="panel-description" class="panel-description">気象庁データを使用して雨雲、アメダス、警報・注意報、台風情報を表示します。</p>
      </section>

      <section class="points-panel">
        <h2>表示内容</h2>
        <div id="detail-list" class="detail-list"></div>
      </section>

      <section class="legend-panel">
        <h2>凡例</h2>
        <div id="legend-list" class="legend-list"></div>
      </section>
    </aside>

    <main id="map-area">
      <div id="map"></div>
      <nav id="main-tabs" aria-label="表示切替">
        <button class="tab-button active" data-tab="radar">雨雲レーダー</button>
        <button class="tab-button" data-tab="amedas">アメダス</button>
        <button class="tab-button" data-tab="warnings">警報・注意報</button>
        <button class="tab-button" data-tab="typhoon">台風情報</button>
      </nav>
      <div id="clock"></div>
      <div id="map-attribution">気象庁データ / 地理院地図</div>
    </main>
  </div>
  <script type="module" src="/src/main.eq.js"></script>
</body>
</html>
