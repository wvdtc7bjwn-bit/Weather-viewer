<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050914" />
  <meta name="application-name" content="Weather Viewer" />
  <title>Weather Viewer</title>
  <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%icons/icon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="%BASE_URL%icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%icons/icon-180.png" />
  <link rel="manifest" href="%BASE_URL%site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <nav id="main-tabs" aria-label="表示切替">
      <button class="tab-button active" data-tab="radar" aria-label="雨雲レーダー">雨雲レーダー</button>
      <button class="tab-button" data-tab="amedas" aria-label="アメダス">アメダス</button>
      <button class="tab-button" data-tab="warnings" aria-label="警報・注意報">警報・注意報</button>
      <button class="tab-button" data-tab="typhoon" aria-label="台風情報">台風情報</button>
    </nav>

    <aside id="sidebar" aria-label="気象情報">
      <section class="current-panel">
        <div id="mode-label" class="mode-label">雨雲レーダー</div>
        <h1 id="panel-title" hidden></h1>
        <p id="panel-time">更新時刻を取得中...</p>
        <div id="current-location-card" class="current-location-card" hidden></div>
        <div id="amedas-sub-tabs" class="amedas-sub-tabs" hidden>
          <button class="amedas-sub-button active" data-amedas-metric="temperature">気温</button>
          <button class="amedas-sub-button" data-amedas-metric="precipitation">降水量</button>
          <button class="amedas-sub-button" data-amedas-metric="wind">風速</button>
          <button class="amedas-sub-button" data-amedas-metric="snow">積雪量</button>
        </div>
        <div id="warning-detail-list" class="warning-detail-list" hidden></div>
        <div id="typhoon-selector" class="typhoon-selector" hidden></div>
        <div id="typhoon-detail-grid" class="typhoon-detail-grid" hidden></div>
        <div id="radar-time-controls" class="radar-time-controls" hidden>
          <div class="radar-time-head">
            <span id="radar-time-kind">観測</span>
            <strong id="radar-time-label">--:--</strong>
          </div>
          <input id="radar-time-slider" class="radar-time-slider" type="range" min="0" max="0" value="0" />
          <div class="radar-time-actions">
            <button id="radar-prev" class="radar-action-button" type="button">5分前</button>
            <button id="radar-play" class="radar-action-button radar-play-button" type="button">再生</button>
            <button id="radar-now" class="radar-action-button" type="button">現在</button>
            <button id="radar-next" class="radar-action-button" type="button">5分後</button>
          </div>
        </div>
        <p id="panel-description" class="panel-description">気象庁データを使用して雨雲、アメダス、警報・注意報、台風情報を表示します。</p>
        <div id="amedas-ranking" class="amedas-ranking" hidden></div>
      </section>

    </aside>

    <main id="map-area">
      <div id="map"></div>
      <div id="clock"></div>
      <button id="locate-button" class="map-locate-button" type="button" aria-label="現在地の気象情報を表示" title="現在地"></button>
      <div id="kikikuru-layer-tabs" class="kikikuru-layer-tabs map-kikikuru-tabs" hidden></div>
      <section id="map-legend" class="map-legend" aria-label="凡例">
        <button id="legend-toggle" class="legend-toggle" type="button" aria-expanded="true" aria-controls="legend-list">
          <span>凡例</span>
        </button>
        <div id="legend-list" class="legend-list"></div>
      </section>
      <div id="map-attribution">気象庁 / Natural Earth / MapLibre GL JS</div>
    </main>

    <div id="warning-modal" class="warning-modal" hidden>
      <div class="warning-modal-backdrop" data-warning-modal-close></div>
      <section class="warning-modal-panel" role="dialog" aria-modal="true" aria-labelledby="warning-modal-title">
        <button class="warning-modal-close" type="button" aria-label="閉じる" data-warning-modal-close>×</button>
        <div id="warning-modal-content"></div>
      </section>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
